---
id: https://openenergyplatform.org/metadata/v20/schema
name: oemetadata_v20
title: Open Energy Metadata Standard v2.0
description: |-
  Handling the oemeta-standard to make it usable in the context of NovaCrate
license: https://creativecommons.org/publicdomain/zero/1.0/
see_also:
  - https://koubaa-hmc.github.io/oemeta-schema

prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  oeo: http://openenergyontology.org/ontology/
  oep: https://openenergyplatform.org/metadata/v20/
  PATO: http://purl.obolibrary.org/obo/PATO_
default_prefix: oep
default_range: string

imports:
  - linkml:types

classes:
  Dataset:
    description: The root class for an OEMetadata record.
    slots:
      - name
      - title
      - description
      - language
      - subject
      - license
      - sources
      - resources
      - spatial
      - temporal
      - publication_date
      - context

  Resource:
    description: A data resource (e.g., a CSV table) described within the dataset.
    slots:
      - name
      - path
      - format
      - schema
      - encoding

  Source:
    description: Information about the origin of the data.
    slots:
      - title
      - path
      - email

slots:
  name:
    description: The machine-readable name of the dataset.
    identifier: true
  title:
    description: Human-readable title.
    slot_uri: schema:name
  description:
    description: Brief summary of the dataset content.
    slot_uri: schema:description
  language:
    description: The language(s) used in the dataset.
    multivalued: true
  subject:
    description: Ontological annotation (e.g., OEO terms).
    multivalued: true
  license:
    description: License terms for the data.
    multivalued: true
  resources:
    description: List of data resources.
    range: Resource
    multivalued: true
  sources:
    description: Information about data sources.
    range: Source
    multivalued: true
  spatial:
    description: Spatial coverage information.
  temporal:
    description: Temporal coverage information.
  context:
    description: Linked Data context.
