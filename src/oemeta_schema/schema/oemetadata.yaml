id: https://openenergyplatform.org/metadata/v20
name: oemetadata_v20
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  oeo: http://openenergyontology.org/ontology/
  oep: https://openenergyplatform.org/metadata/v20/
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: oep
default_range: string
classes:
  Subject:
    slots:
    - subject_name
  Embargoperiod:
    slots:
    - start
    - end
    - isActive
  Context:
    slots:
    - title
    - homepage
    - documentation
    - sourceCode
    - publisher
    - publisherLogo
    - contact
    - fundingAgency
    - fundingAgencyLogo
    - grantNo
  Location:
    slots:
    - address
    - latitude
    - longitude
  Extent:
    slots:
    - extent_name
    - resolutionValue
    - resolutionUnit
    - boundingBox
    - crs
  Spatial:
    slots:
    - location
    - extent
  Timeserie:
    slots:
    - start
    - end
    - resolutionValue
    - resolutionUnit
    - alignment
    - aggregationType
  Temporal:
    slots:
    - referenceDate
    - timeseries
  Sourcelicense:
    slots:
    - sourcelicense_name
    - title
    - path
    - instruction
    - attribution
    - copyrightStatement
  Source:
    slots:
    - title
    - authors
    - source_description
    - publicationYear
    - path
    - sourceLicenses
  License:
    slots:
    - license_name
    - title
    - path
    - instruction
    - attribution
    - copyrightStatement
  Contributor:
    slots:
    - title
    - path
    - organization
    - roles
    - date
    - object
    - comment
  Isabout:
    slots:
    - isabout_name
  Valuereference:
    slots:
    - value
    - valuereference_name
  Field:
    slots:
    - field_name
    - field_description
    - type
    - nullable
    - unit
    - isAbout
    - valueReference
  Reference:
    slots:
    - resource
    - fields
  Foreignkey:
    slots:
    - fields
    - reference
  Schema:
    slots:
    - fields
    - primaryKey
    - foreignKeys
  Dialect:
    slots:
    - delimiter
    - decimalSeparator
  Review:
    slots:
    - path
    - badge
  Resource:
    slots:
    - resource_name
    - topics
    - title
    - path
    - resource_description
    - languages
    - subject
    - keywords
    - publicationDate
    - embargoPeriod
    - context
    - spatial
    - temporal
    - sources
    - licenses
    - contributors
    - type
    - format
    - encoding
    - schema
    - dialect
    - review
  Metadatalicense:
    slots:
    - metadatalicense_name
    - title
    - path
  Metametadata:
    slots:
    - metadataVersion
    - metadataLicense
  Dataset:
    slots:
    - dataset_name
    - title
    - dataset_description
    - resources
    - metaMetadata
    tree_root: true
slots:
  dataset_name:
    description: A filename or database conform dataset name.
  title:
    description: The official (human readable) title of the license.
    slot_uri: schema:name
  dataset_description:
    description: A free text description of the dataset.
    slot_uri: schema:description
  resource_name:
    description: A filename or database conform table name.
  topics:
    description: An array of predefined topics that correspond to the database schemas
      of the OEP.
    multivalued: true
  path:
    description: A link or path to the license text.
  resource_description:
    description: A description of the table. It should be usable as summary information
      for the table that is described by the metadata.
    slot_uri: schema:description
  languages:
    description: An array of languages used within the described data structures (e.g.
      titles, descriptions) or metadata.
    multivalued: true
  subject_name:
    description: A class label of the ontology term.
  subject:
    description: An array of objects that references to the subjects of the resource
      in ontology terms.
    slot_uri: oeo:OEO_00010000
    multivalued: true
    range: Subject
  keywords:
    description: An array of freely selectable keywords that help with searching and
      structuring.
    multivalued: true
  publicationDate:
    description: A date of publication of the data or metadata. The date format is
      ISO 8601 (YYYY-MM-DD).
  start:
    description: The start time of a time series.
  end:
    description: The temporal end point of a time series.
  isActive:
    description: A boolean key that indicates if the embargo period is currently active.
      Must be changed to False on the embargo period end date.
  embargoPeriod:
    description: An object that describes the embargo period during which public access
      to the data is not allowed.
    range: Embargoperiod
  homepage:
    description: A URL of the project.
  documentation:
    description: A URL of the project documentation.
  sourceCode:
    description: A URL of the source code of the project.
  publisher:
    description: The publishing agency of the data. This can be the OEP.
  publisherLogo:
    description: A URL to the logo of the publishing agency of data.
  contact:
    description: A reference to the creator or maintainer of the data set. This can
      be an email address or a GitHub handle.
  fundingAgency:
    description: A name of the entity providing the funding. This can be a government
      agency or a company.
  fundingAgencyLogo:
    description: A URL to the logo or image of the funding agency.
  grantNo:
    description: An identifying grant number. In case of a publicly funded project,
      this number is assigned by the funding agency.
  context:
    description: An Object that describes the general setting, environment or project
      leading to the creation or maintenance of this dataset. In science this can
      be the research project.
    range: Context
  address:
    description: An address of the location of the data. May be specified with street
      name, house number, zip code, and city name.
  latitude:
    description: The latitude (lat) information of the location. Specifies the north
      / south position of the geometry.
  longitude:
    description: The longitude (lon) information of the location. Specifies the east
      / west position of the geometry.
  location:
    description: An object that describes a covered area or region.
    range: Location
  extent_name:
    description: The name of the region.
  resolutionValue:
    description: The time span between individual information points in a time series.
      The value of the resolution.
  resolutionUnit:
    description: The unit of the temporal resolution.
  boundingBox:
    description: The covered area specified by the coordinates of a bounding box.
      The format is [minLon, minLat, maxLon, maxLat] or [W,S,E,N].
    multivalued: true
  crs:
    description: The Coordinate Reference System, specified as an EPSG code.
  extent:
    description: An object that describes a covered area or region.
    range: Extent
  spatial:
    description: An object that describes the spatial context of the data.
    range: Spatial
  referenceDate:
    description: A base year, month or day. The time for which the data should be
      accurate. Date Format is ISO 8601.
  alignment:
    description: An indicator of whether timestamps in a time series are to the left,
      right or in the centre.
  aggregationType:
    description: An indicator of whether the values are a sum, an average or a current
      value.
  timeseries:
    description: An array that describe the timeseries.
    multivalued: true
    range: Timeserie
  temporal:
    description: An object with the time period covered in the data. Temporal information
      should contain a "referenceDate" or the keys that describe a time series, or
      both.
    range: Temporal
  authors:
    description: An array of the full names of the authors of the source material.
    multivalued: true
  source_description:
    description: A free text description of the source.
    slot_uri: schema:description
  publicationYear:
    description: Indicates the year when the work was published.
  sourcelicense_name:
    description: The SPDX identifier.
  instruction:
    description: A short description of rights and obligations. The use of tl;drLegal
      is recommended.
  attribution:
    description: A copyright holder of the data. Must be provided if attribution licenses
      are used.
  copyrightStatement:
    description: A link or path that proves that the source or data has the appropriate
      license. This can be a page number or website imprint.
  sourceLicenses:
    description: ''
    multivalued: true
    range: Sourcelicense
  sources:
    description: An array of objects with the used and underlying sources of the data
      and metadata.
    multivalued: true
    range: Source
  license_name:
    description: The SPDX identifier.
  licenses:
    description: An array of objects of licenses under which the described data is
      provided.
    multivalued: true
    range: License
  organization:
    description: A string describing the organization this contributor is affiliated
      to. This can be relevant for the copyright.
  roles:
    description: An array describing the roles of the contributor.
    multivalued: true
  date:
    description: The date of the contribution. Date Format is ISO 8601.
  object:
    description: The object of the contribution. Which part of the package was supplied
      or changed.
  comment:
    description: A free-text commentary on what has been done.
  contributors:
    description: An array of objects of contributors and contributions to the data
      or metadata.
    multivalued: true
    range: Contributor
  type:
    description: The data type of the field. In case of a geom column in a database,
      also indicate the shape and CRS.
  format:
    description: A file extension format. Possible options are 'csv', 'xlsx', 'json',
      'PostgreSQL', 'SQLite' and other standard file extensions.
  encoding:
    description: Specifies the character encoding of the resource's data file. The
      default is 'UTF-8'. The values should be one of the 'Preferred MIME Names'.
  field_name:
    description: The name of the field. The name may only consist of lowercase alphanumeric
      characters or underscores. It must not begin with a number or an underscore.
  field_description:
    description: A text describing the field.
    slot_uri: schema:description
  nullable:
    description: A boolean key to specify that a column can be nullable. True is the
      default value.
  unit:
    description: The unit of a field. If it does not apply, use 'null'. If the unit
      is given in a separate field, reference this field (e.g. 'unit'). Use a space
      between numbers and units (100 m).
    slot_uri: oeo:OEO_00010045
  isabout_name:
    description: The class label of the ontology term.
  isAbout:
    description: An array of objects that describes the field in ontology terms.
    multivalued: true
    range: Isabout
  value:
    description: The name of the value in the column.
  valuereference_name:
    description: The class label of the ontology term in the column.
  valueReference:
    description: An array of objects for an extended description of the values in
      the column in ontology terms.
    multivalued: true
    range: Valuereference
  fields:
    description: The foreign resource column.
    multivalued: true
  primaryKey:
    description: An array of fields that uniquely identifies each row in the table.
    multivalued: true
  resource:
    description: The referenced foreign table.
  reference:
    description: The reference to the foreign table.
    range: Reference
  foreignKeys:
    description: List of foreign keys.
    multivalued: true
    range: Foreignkey
  schema:
    description: An object that describes the structure of a table. It contains all
      fields (columns of the table), the primary key and optional foreign keys.
    range: Schema
  delimiter:
    description: The delimiter specifies the character sequence which should separate
      fields (columns). Common characters are ',' (comma), ';' (semicolon), '.' (point)
      and '\t' (tab).
  decimalSeparator:
    description: The symbol used to separate the integer part from the fractional
      part of a number written in decimal form. Depending on language and region this
      symbol can be '.' or ','.
  dialect:
    description: The Dialect defines a simple format for describing the various dialects
      of CSV files in a language-independent manner. In a database, the values in
      the fields are 'null'.
    range: Dialect
  badge:
    description: A badge of either Iron, Bronze, Silver, Gold or Platinum is used
      to label the quality of the metadata.
  review:
    description: The metadata on the OEP can go through an open peer review process.
      See the Academy course [Open Peer Review](https://openenergyplatform.github.io/academy/courses/09_peer_review/)
      for further information.
    range: Review
  resources:
    description: A collection of related resources.
    multivalued: true
    range: Resource
  metadataVersion:
    description: Type and version number of the metadata.
  metadatalicense_name:
    description: The SPDX identifier.
  metadataLicense:
    description: 'The license of the OEMetadata. '
    range: Metadatalicense
  metaMetadata:
    description: An object that describes the metadata themselves, their format, version
      and license.
    range: Metametadata
enums: {}
